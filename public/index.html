<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neo DLC — Панель управления</title>
    <link rel="icon" type="image/png" href="/neodlc.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #000;
            color: #fff;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
            font-weight: 300;
            line-height: 1.5;
        }

        #particles-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        #forbidden-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #000;
            z-index: 999;
            display: none;
            justify-content: center;
            align-items: center;
            font-size: 2rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: #fff;
            opacity: 0.9;
        }
        #forbidden-overlay.show { display: flex; }

        .layout {
            display: flex;
            width: 100%;
            height: 100%;
            position: relative;
            z-index: 2;
        }

        .sidebar {
            width: 260px;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(12px);
            border-right: 1px solid rgba(255,255,255,0.25);
            padding: 2.5rem 1.2rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            flex-shrink: 0;
            overflow-y: auto;
        }
        .sidebar .brand {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 2rem;
            padding-bottom: 1.2rem;
            border-bottom: 1px solid rgba(255,255,255,0.2);
        }
        .sidebar .brand img {
            width: 34px; height: 34px;
            object-fit: contain;
            filter: drop-shadow(0 0 8px rgba(255,255,255,0.3));
        }
        .sidebar .brand span {
            font-weight: 300;
            font-size: 1.1rem;
            letter-spacing: 3px;
            color: #fff;
            text-transform: uppercase;
        }
        .sidebar .tab {
            padding: 0.75rem 1rem;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            color: rgba(255,255,255,0.7);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-size: 0.85rem;
            font-weight: 400;
            border: 1px solid transparent;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            background: transparent;
            position: relative;
            overflow: hidden;
        }
        .sidebar .tab::before {
            content: '';
            position: absolute;
            left: 0; top: 0;
            width: 3px; height: 100%;
            background: #fff;
            transform: scaleY(0);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .sidebar .tab:hover::before,
        .sidebar .tab.active::before {
            transform: scaleY(1);
        }
        .sidebar .tab svg {
            width: 18px; height: 18px;
            stroke: rgba(255,255,255,0.7);
            transition: stroke 0.3s;
            stroke-width: 1.2;
            fill: none;
        }
        .sidebar .tab:hover {
            color: #fff;
            background: rgba(255,255,255,0.05);
            border-color: rgba(255,255,255,0.4);
        }
        .sidebar .tab:hover svg { stroke: #fff; }
        .sidebar .tab.active {
            color: #fff;
            background: rgba(255,255,255,0.08);
            border-color: rgba(255,255,255,0.7);
            font-weight: 500;
        }
        .sidebar .tab.active svg { stroke: #fff; }

        .main {
            flex: 1;
            overflow-y: auto;
            padding: 2.5rem;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }
        .content-panel {
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(16px);
            border-radius: 4px;
            padding: 3rem;
            width: 100%;
            max-width: 800px;
            border: 1px solid rgba(255,255,255,0.25);
            animation: fadeSlideIn 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 0 40px rgba(255,255,255,0.03);
            transition: all 0.3s ease;
        }
        .content-panel:hover {
            border-color: rgba(255,255,255,0.4);
            box-shadow: 0 0 60px rgba(255,255,255,0.06);
        }
        .content-panel h1 {
            font-weight: 300;
            font-size: 1.8rem;
            letter-spacing: 2.5px;
            color: #fff;
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            gap: 0.6rem;
            text-transform: uppercase;
            border-bottom: 1px solid rgba(255,255,255,0.15);
            padding-bottom: 1rem;
        }
        .content-panel h1 svg {
            width: 26px; height: 26px;
            stroke: #fff;
            stroke-width: 1.2;
            fill: none;
        }

        label {
            display: block;
            margin-top: 1.8rem;
            font-size: 0.8rem;
            color: rgba(255,255,255,0.7);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 400;
        }
        textarea, input[type="text"] {
            width: 100%;
            padding: 0.75rem 1rem;
            margin-top: 0.5rem;
            background: rgba(0,0,0,0.6);
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 4px;
            color: #fff;
            font-size: 0.95rem;
            font-weight: 300;
            transition: all 0.3s ease;
            outline: none;
            font-family: inherit;
        }
        textarea { resize: vertical; min-height: 80px; }
        input:focus, textarea:focus {
            border-color: #fff;
            box-shadow: 0 0 0 2px rgba(255,255,255,0.15);
        }

        .toggle-group {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 1.8rem;
        }
        .toggle-group label { margin: 0; }
        .switch { position: relative; display: inline-block; width: 46px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background-color: #000; border: 1px solid rgba(255,255,255,0.5);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 4px;
        }
        .slider:before {
            position: absolute; content: ""; height: 18px; width: 18px; left: 2px; bottom: 2px;
            background-color: #fff; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 2px;
        }
        input:checked + .slider {
            background-color: #fff;
            border-color: #fff;
        }
        input:checked + .slider:before {
            transform: translateX(22px);
            background-color: #000;
        }

        button {
            margin-top: 2.2rem;
            width: 100%;
            padding: 0.85rem;
            background: transparent;
            border: 1px solid rgba(255,255,255,0.6);
            color: #fff;
            font-size: 0.95rem;
            font-weight: 400;
            letter-spacing: 2px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            text-transform: uppercase;
            position: relative;
            overflow: hidden;
        }
        button::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: rgba(255,255,255,0.05);
            transition: left 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        button:hover::before { left: 0; }
        button:hover {
            border-color: #fff;
            box-shadow: 0 0 25px rgba(255,255,255,0.15);
        }
        button:active { transform: scale(0.98); }

        .save-status {
            text-align: center;
            margin-top: 1.2rem;
            font-size: 0.8rem;
            font-weight: 300;
            letter-spacing: 1px;
            opacity: 0;
            transition: opacity 0.4s ease;
        }
        .save-status.show { opacity: 1; }

        /* Кастомный выпадающий список с чекбоксами */
        .custom-select {
            position: relative;
            margin-top: 0.5rem;
            user-select: none;
        }
        .custom-select .select-header {
            padding: 0.75rem 1rem;
            background: rgba(0,0,0,0.6);
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.3s ease;
            font-size: 0.95rem;
            font-weight: 300;
        }
        .custom-select .select-header:hover {
            border-color: rgba(255,255,255,0.6);
        }
        .custom-select .select-header .arrow {
            transition: transform 0.3s ease;
            font-size: 0.8rem;
        }
        .custom-select.open .select-header .arrow {
            transform: rotate(180deg);
        }
        .custom-select .dropdown {
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: #0a0a0a;
            border: 1px solid rgba(255,255,255,0.4);
            border-radius: 4px;
            max-height: 200px;
            overflow-y: auto;
            z-index: 10;
        }
        .custom-select.open .dropdown {
            display: block;
        }
        .custom-select .dropdown label {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.6rem 1rem;
            cursor: pointer;
            font-size: 0.9rem;
            color: #ccc;
            margin: 0;
            text-transform: none;
            letter-spacing: normal;
            transition: background 0.2s;
        }
        .custom-select .dropdown label:hover {
            background: rgba(255,255,255,0.05);
            color: #fff;
        }
        .custom-select .dropdown input[type="checkbox"] {
            accent-color: #fff;
            width: 16px;
            height: 16px;
        }

        @keyframes fadeSlideIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .hidden { display: none; }
    </style>
</head>
<body>

    <canvas id="particles-canvas"></canvas>
    <div id="forbidden-overlay">НЕВЕРНЫЙ КЛЮЧ</div>

    <div class="layout">
        <div class="sidebar">
            <div class="brand">
                <img src="/neodlc.png" alt="Neo DLC Logo">
                <span>Neo DLC</span>
            </div>
            <div class="tab active" data-panel="welcome">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>
                Приветствие
            </div>
            <div class="tab" data-panel="autorole">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M16 21v-2a4 4 0 00-4-4H6a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>
                Автороль
            </div>
            <div class="tab" data-panel="verify">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="M9 12l2 2 4-4"/></svg>
                Verify
            </div>
            <div class="tab" data-panel="tickets">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M20 12V6H4v6a2 2 0 100 4v6h16v-6a2 2 0 100-4z"/><path d="M14 12h.01"/></svg>
                Тикеты
            </div>
            <div class="tab" data-panel="moderation">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z"/><path d="M9 12l2 2 4-4"/></svg>
                Модерация
            </div>
        </div>

        <div class="main">
            <!-- Приветствие -->
            <div class="content-panel" id="panel-welcome">
                <h1>
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>
                    Приветствие
                </h1>
                <div class="toggle-group">
                    <label>Приветствие</label>
                    <label class="switch"><input type="checkbox" id="welcomeEnabled" checked><span class="slider"></span></label>
                </div>
                <label>Канал для приветствия</label>
                <select id="welcomeChannelId" class="normal-select"><option value="">-- выберите канал --</option></select>
                <label>Текст приветствия</label>
                <textarea id="welcomeMessage" placeholder="Используйте {user} для упоминания"></textarea>
                <button id="saveWelcomeBtn">СОХРАНИТЬ</button>
                <div class="save-status" id="status-welcome"></div>
            </div>

            <!-- Автороль -->
            <div class="content-panel hidden" id="panel-autorole">
                <h1>
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M16 21v-2a4 4 0 00-4-4H6a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>
                    Автороль
                </h1>
                <label>Роль Member (выдаётся всем новым)</label>
                <select id="memberRoleId" class="normal-select"><option value="">-- не выбрана --</option></select>
                <label>Роль Unverified (выдаётся при включённой верификации)</label>
                <select id="unverifiedRoleId" class="normal-select"><option value="">-- не выбрана --</option></select>
                <button id="saveAutoroleBtn">СОХРАНИТЬ</button>
                <div class="save-status" id="status-autorole"></div>
            </div>

            <!-- Verify -->
            <div class="content-panel hidden" id="panel-verify">
                <h1>
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="M9 12l2 2 4-4"/></svg>
                    Верификация
                </h1>
                <div class="toggle-group">
                    <label>Включить верификацию</label>
                    <label class="switch"><input type="checkbox" id="verifyEnabled"><span class="slider"></span></label>
                </div>
                <label>Канал для верификации</label>
                <select id="verifyChannelId" class="normal-select"><option value="">-- выберите канал --</option></select>
                <label>Роль "Verified"</label>
                <select id="verifiedRoleId" class="normal-select"><option value="">-- выберите роль --</option></select>
                <button id="saveVerifyBtn">СОХРАНИТЬ</button>
                <div class="save-status" id="status-verify"></div>
            </div>

            <!-- Тикеты -->
            <div class="content-panel hidden" id="panel-tickets">
                <h1>
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M20 12V6H4v6a2 2 0 100 4v6h16v-6a2 2 0 100-4z"/><path d="M14 12h.01"/></svg>
                    Тикеты
                </h1>
                <div class="toggle-group">
                    <label>Включить тикеты</label>
                    <label class="switch"><input type="checkbox" id="ticketEnabled"><span class="slider"></span></label>
                </div>
                <label>Канал для панели тикетов</label>
                <select id="ticketChannelId" class="normal-select"><option value="">-- выберите канал --</option></select>
                <label>Категория для тикетов</label>
                <select id="ticketCategoryId" class="normal-select"><option value="">-- выберите категорию --</option></select>
                <button id="saveTicketsBtn">СОХРАНИТЬ</button>
                <div class="save-status" id="status-tickets"></div>
            </div>

            <!-- Модерация -->
            <div class="content-panel hidden" id="panel-moderation">
                <h1>
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z"/><path d="M9 12l2 2 4-4"/></svg>
                    Модерация
                </h1>
                <div class="toggle-group">
                    <label>Ограничить модерацию</label>
                    <label class="switch"><input type="checkbox" id="moderationEnabled"><span class="slider"></span></label>
                </div>

                <label>Роли для /ban</label>
                <div class="custom-select" id="custom-ban"><div class="select-header"><span>Выберите роли</span><span class="arrow">▼</span></div><div class="dropdown"></div></div>

                <label>Роли для /kick</label>
                <div class="custom-select" id="custom-kick"><div class="select-header"><span>Выберите роли</span><span class="arrow">▼</span></div><div class="dropdown"></div></div>

                <label>Роли для /mute</label>
                <div class="custom-select" id="custom-mute"><div class="select-header"><span>Выберите роли</span><span class="arrow">▼</span></div><div class="dropdown"></div></div>

                <label>Роли для /warn</label>
                <div class="custom-select" id="custom-warn"><div class="select-header"><span>Выберите роли</span><span class="arrow">▼</span></div><div class="dropdown"></div></div>

                <label>Роли для /clear</label>
                <div class="custom-select" id="custom-clear"><div class="select-header"><span>Выберите роли</span><span class="arrow">▼</span></div><div class="dropdown"></div></div>

                <label>Роли для /lock</label>
                <div class="custom-select" id="custom-lock"><div class="select-header"><span>Выберите роли</span><span class="arrow">▼</span></div><div class="dropdown"></div></div>

                <label>Роли для /unlock</label>
                <div class="custom-select" id="custom-unlock"><div class="select-header"><span>Выберите роли</span><span class="arrow">▼</span></div><div class="dropdown"></div></div>

                <label>Роли для /slowmode</label>
                <div class="custom-select" id="custom-slowmode"><div class="select-header"><span>Выберите роли</span><span class="arrow">▼</span></div><div class="dropdown"></div></div>

                <label>Роли для /banlist</label>
                <div class="custom-select" id="custom-banlist"><div class="select-header"><span>Выберите роли</span><span class="arrow">▼</span></div><div class="dropdown"></div></div>

                <button id="saveModerationBtn">СОХРАНИТЬ</button>
                <div class="save-status" id="status-moderation"></div>
            </div>
        </div>
    </div>

    <script>
        const API_KEY = new URLSearchParams(window.location.search).get('key');
        if (!API_KEY) {
            document.addEventListener('DOMContentLoaded', () => {
                document.getElementById('forbidden-overlay').classList.add('show');
                document.querySelector('.layout').style.display = 'none';
            });
        } else {
            sessionStorage.setItem('api_key', API_KEY);
        }
        const key = sessionStorage.getItem('api_key') || API_KEY;
        const headers = { 'Content-Type': 'application/json' };

        function showForbidden() {
            document.getElementById('forbidden-overlay').classList.add('show');
            document.querySelector('.layout').style.display = 'none';
        }

        // переключение вкладок
        const tabs = document.querySelectorAll('.sidebar .tab');
        const panels = document.querySelectorAll('.content-panel');
        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                const panelId = tab.dataset.panel;
                tabs.forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                panels.forEach(p => p.classList.add('hidden'));
                document.getElementById(`panel-${panelId}`).classList.remove('hidden');
            });
        });

        // Приветствие
        const welcomeEnabledCheck = document.getElementById('welcomeEnabled');
        const welcomeChannelSelect = document.getElementById('welcomeChannelId');
        const welcomeMessageText = document.getElementById('welcomeMessage');
        const statusWelcome = document.getElementById('status-welcome');

        // Автороль
        const memberRoleSelect = document.getElementById('memberRoleId');
        const unverifiedRoleSelect = document.getElementById('unverifiedRoleId');
        const statusAutorole = document.getElementById('status-autorole');

        // Verify
        const verifyEnabledCheck = document.getElementById('verifyEnabled');
        const verifyChannelSelect = document.getElementById('verifyChannelId');
        const verifiedRoleSelect = document.getElementById('verifiedRoleId');
        const statusVerify = document.getElementById('status-verify');

        // Тикеты
        const ticketEnabledCheck = document.getElementById('ticketEnabled');
        const ticketChannelSelect = document.getElementById('ticketChannelId');
        const ticketCategorySelect = document.getElementById('ticketCategoryId');
        const statusTickets = document.getElementById('status-tickets');

        // Модерация
        const moderationEnabledCheck = document.getElementById('moderationEnabled');
        const statusModeration = document.getElementById('status-moderation');
        const customSelects = {
            ban: document.getElementById('custom-ban'),
            kick: document.getElementById('custom-kick'),
            mute: document.getElementById('custom-mute'),
            warn: document.getElementById('custom-warn'),
            clear: document.getElementById('custom-clear'),
            lock: document.getElementById('custom-lock'),
            unlock: document.getElementById('custom-unlock'),
            slowmode: document.getElementById('custom-slowmode'),
            banlist: document.getElementById('custom-banlist')
        };

        // Массив всех ролей (заполним позже)
        let allRoles = [];

        // Инициализация кастомного списка
        function initCustomSelect(container, command) {
            const header = container.querySelector('.select-header');
            const dropdown = container.querySelector('.dropdown');

            // Закрывать при клике вне
            document.addEventListener('click', (e) => {
                if (!container.contains(e.target)) {
                    container.classList.remove('open');
                }
            });

            header.addEventListener('click', () => {
                container.classList.toggle('open');
            });

            // Обновить текст выбранных
            function updateText() {
                const checked = dropdown.querySelectorAll('input:checked');
                const names = Array.from(checked).map(cb => cb.dataset.name);
                header.querySelector('span').textContent = names.length > 0 ? names.join(', ') : 'Выберите роли';
            }

            // Заполнение dropdown
            function populate(selectedIds = []) {
                dropdown.innerHTML = '';
                allRoles.forEach(role => {
                    const label = document.createElement('label');
                    const cb = document.createElement('input');
                    cb.type = 'checkbox';
                    cb.value = role.id;
                    cb.dataset.name = role.name;
                    cb.checked = selectedIds.includes(role.id);
                    cb.addEventListener('change', updateText);
                    label.appendChild(cb);
                    label.appendChild(document.createTextNode(role.name));
                    dropdown.appendChild(label);
                });
                updateText();
            }

            // Методы доступны снаружи
            container.populate = populate;
            container.getSelectedIds = () => {
                return Array.from(dropdown.querySelectorAll('input:checked')).map(cb => cb.value);
            };
            container.setSelectedIds = (ids) => {
                const checkboxes = dropdown.querySelectorAll('input');
                checkboxes.forEach(cb => cb.checked = ids.includes(cb.value));
                updateText();
            };
        }

        // Инициализировать все кастомные списки
        for (const [cmd, container] of Object.entries(customSelects)) {
            initCustomSelect(container, cmd);
        }

        // Утилиты загрузки
        async function loadChannels(selectElement) {
            const url = `/api/channels?key=${encodeURIComponent(key)}`;
            const res = await fetch(url, { headers });
            if (res.status === 403) { showForbidden(); return; }
            if (!res.ok) throw new Error('Ошибка загрузки каналов');
            const channels = await res.json();
            selectElement.innerHTML = '<option value="">-- выберите канал --</option>';
            channels.forEach(ch => {
                const opt = document.createElement('option'); opt.value = ch.id; opt.textContent = ch.name;
                selectElement.appendChild(opt);
            });
        }

        async function loadRolesIntoSelect(selectElement) {
            const url = `/api/roles?key=${encodeURIComponent(key)}`;
            const res = await fetch(url, { headers });
            if (res.status === 403) { showForbidden(); return; }
            if (!res.ok) throw new Error('Ошибка загрузки ролей');
            const roles = await res.json();
            allRoles = roles; // сохраняем для кастомных списков
            selectElement.innerHTML = '<option value="">-- без роли --</option>';
            roles.forEach(r => {
                const opt = document.createElement('option'); opt.value = r.id; opt.textContent = r.name;
                selectElement.appendChild(opt);
            });
            // Заполним все кастомные списки
            for (const container of Object.values(customSelects)) {
                container.populate([]);
            }
        }

        async function loadCategories(selectElement) {
            const url = `/api/categories?key=${encodeURIComponent(key)}`;
            const res = await fetch(url, { headers });
            if (res.status === 403) { showForbidden(); return; }
            if (!res.ok) throw new Error('Ошибка загрузки категорий');
            const categories = await res.json();
            selectElement.innerHTML = '<option value="">-- выберите категорию --</option>';
            categories.forEach(cat => {
                const opt = document.createElement('option'); opt.value = cat.id; opt.textContent = cat.name;
                selectElement.appendChild(opt);
            });
        }

        // Загрузка конфигов
        async function loadWelcomeConfig() {
            const url = `/api/config?key=${encodeURIComponent(key)}`;
            const res = await fetch(url, { headers });
            if (res.status === 403) { showForbidden(); return; }
            const cfg = await res.json();
            welcomeEnabledCheck.checked = cfg.welcomeEnabled !== false;
            if (cfg.welcomeChannelId) welcomeChannelSelect.value = cfg.welcomeChannelId;
            welcomeMessageText.value = cfg.welcomeMessage || 'Добро пожаловать, {user}, на сервер!';
        }

        async function loadAutoroleConfig() {
            const url = `/api/config?key=${encodeURIComponent(key)}`;
            const res = await fetch(url, { headers });
            if (res.status === 403) { showForbidden(); return; }
            const cfg = await res.json();
            if (cfg.memberRoleId) memberRoleSelect.value = cfg.memberRoleId;
            if (cfg.unverifiedRoleId) unverifiedRoleSelect.value = cfg.unverifiedRoleId;
        }

        async function loadVerifyConfig() {
            const url = `/api/verifysettings?key=${encodeURIComponent(key)}`;
            const res = await fetch(url, { headers });
            if (res.status === 403) { showForbidden(); return; }
            const cfg = await res.json();
            verifyEnabledCheck.checked = cfg.verifyEnabled === true;
            if (cfg.verifyChannelId) verifyChannelSelect.value = cfg.verifyChannelId;
            if (cfg.verifiedRoleId) verifiedRoleSelect.value = cfg.verifiedRoleId;
        }

        async function loadTicketsConfig() {
            const url = `/api/ticketsettings?key=${encodeURIComponent(key)}`;
            const res = await fetch(url, { headers });
            if (res.status === 403) { showForbidden(); return; }
            const cfg = await res.json();
            ticketEnabledCheck.checked = cfg.ticketEnabled === true;
            if (cfg.ticketChannelId) ticketChannelSelect.value = cfg.ticketChannelId;
            if (cfg.ticketCategoryId) ticketCategorySelect.value = cfg.ticketCategoryId;
        }

        async function loadModerationConfig() {
            const url = `/api/moderation?key=${encodeURIComponent(key)}`;
            const res = await fetch(url, { headers });
            if (res.status === 403) { showForbidden(); return; }
            const cfg = await res.json();
            moderationEnabledCheck.checked = cfg.moderationEnabled === true;
            const rolesMap = cfg.moderationRoles || {};
            for (const [cmd, container] of Object.entries(customSelects)) {
                const allowed = rolesMap[cmd] || [];
                container.setSelectedIds(allowed);
            }
        }

        // Сохранение
        async function saveWelcomeConfig() {
            const body = {
                welcomeEnabled: welcomeEnabledCheck.checked,
                welcomeChannelId: welcomeEnabledCheck.checked ? welcomeChannelSelect.value : '',
                welcomeMessage: welcomeMessageText.value.trim()
            };
            const url = `/api/config?key=${encodeURIComponent(key)}`;
            const res = await fetch(url, { method: 'POST', headers, body: JSON.stringify(body) });
            if (res.status === 403) { showStatus(statusWelcome, 'Неверный ключ', false); return; }
            const data = await res.json();
            showStatus(statusWelcome, data.success ? '✅ Настройки сохранены!' : '❌ Ошибка', data.success);
        }

        async function saveAutoroleConfig() {
            const body = {
                memberRoleId: memberRoleSelect.value,
                unverifiedRoleId: unverifiedRoleSelect.value
            };
            const url = `/api/config?key=${encodeURIComponent(key)}`;
            const res = await fetch(url, { method: 'POST', headers, body: JSON.stringify(body) });
            if (res.status === 403) { showStatus(statusAutorole, 'Неверный ключ', false); return; }
            const data = await res.json();
            showStatus(statusAutorole, data.success ? '✅ Настройки сохранены!' : '❌ Ошибка', data.success);
        }

        async function saveVerifyConfig() {
            const body = {
                verifyEnabled: verifyEnabledCheck.checked,
                verifyChannelId: verifyChannelSelect.value,
                verifiedRoleId: verifiedRoleSelect.value
            };
            const url = `/api/verifysettings?key=${encodeURIComponent(key)}`;
            const res = await fetch(url, { method: 'POST', headers, body: JSON.stringify(body) });
            if (res.status === 403) { showStatus(statusVerify, 'Неверный ключ', false); return; }
            const data = await res.json();
            showStatus(statusVerify, data.success ? '✅ Настройки сохранены!' : '❌ Ошибка', data.success);
        }

        async function saveTicketsConfig() {
            const body = {
                ticketEnabled: ticketEnabledCheck.checked,
                ticketChannelId: ticketChannelSelect.value,
                ticketCategoryId: ticketCategorySelect.value
            };
            const url = `/api/ticketsettings?key=${encodeURIComponent(key)}`;
            const res = await fetch(url, { method: 'POST', headers, body: JSON.stringify(body) });
            if (res.status === 403) { showStatus(statusTickets, 'Неверный ключ', false); return; }
            const data = await res.json();
            showStatus(statusTickets, data.success ? '✅ Настройки сохранены!' : '❌ Ошибка', data.success);
        }

        async function saveModerationConfig() {
            const moderationRoles = {};
            for (const [cmd, container] of Object.entries(customSelects)) {
                moderationRoles[cmd] = container.getSelectedIds();
            }
            const body = {
                moderationEnabled: moderationEnabledCheck.checked,
                moderationRoles
            };
            const url = `/api/moderation?key=${encodeURIComponent(key)}`;
            const res = await fetch(url, { method: 'POST', headers, body: JSON.stringify(body) });
            if (res.status === 403) { showStatus(statusModeration, 'Неверный ключ', false); return; }
            const data = await res.json();
            showStatus(statusModeration, data.success ? '✅ Настройки сохранены!' : '❌ Ошибка', data.success);
        }

        function showStatus(element, msg, ok) {
            element.textContent = msg;
            element.style.color = ok ? '#ffffff' : '#ff5555';
            element.classList.add('show');
            setTimeout(() => element.classList.remove('show'), 2500);
        }

        // Частицы
        const canvas = document.getElementById('particles-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resizeCanvas); resizeCanvas();
        class Particle {
            constructor() { this.reset(); }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 1.5 + 0.5;
                this.speedX = (Math.random() - 0.5) * 0.3;
                this.speedY = (Math.random() - 0.5) * 0.3;
                this.opacity = Math.random() * 0.5 + 0.1;
            }
            update() {
                this.x += this.speedX; this.y += this.speedY;
                if (this.x < 0 || this.x > canvas.width) this.speedX *= -1;
                if (this.y < 0 || this.y > canvas.height) this.speedY *= -1;
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI*2);
                ctx.fillStyle = `rgba(255,255,255,${this.opacity})`;
                ctx.fill();
            }
        }
        function initParticles(count=120) {
            particles = [];
            for (let i=0; i<count; i++) particles.push(new Particle());
        }
        function animateParticles() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animateParticles);
        }
        initParticles(); animateParticles();

        // Инициализация
        async function init() {
            if (!API_KEY) return;
            const testUrl = `/api/config?key=${encodeURIComponent(key)}`;
            const testRes = await fetch(testUrl, { headers });
            if (testRes.status === 403) { showForbidden(); return; }

            await Promise.all([
                loadChannels(welcomeChannelSelect),
                loadChannels(verifyChannelSelect),
                loadChannels(ticketChannelSelect),
                loadRolesIntoSelect(memberRoleSelect), // загрузит allRoles и заполнит кастомные списки
                loadRolesIntoSelect(unverifiedRoleSelect),
                loadRolesIntoSelect(verifiedRoleSelect),
                loadCategories(ticketCategorySelect)
            ]);

            await loadWelcomeConfig();
            await loadAutoroleConfig();
            await loadVerifyConfig();
            await loadTicketsConfig();
            await loadModerationConfig();

            document.getElementById('saveWelcomeBtn').addEventListener('click', saveWelcomeConfig);
            document.getElementById('saveAutoroleBtn').addEventListener('click', saveAutoroleConfig);
            document.getElementById('saveVerifyBtn').addEventListener('click', saveVerifyConfig);
            document.getElementById('saveTicketsBtn').addEventListener('click', saveTicketsConfig);
            document.getElementById('saveModerationBtn').addEventListener('click', saveModerationConfig);
        }
        window.addEventListener('load', init);
    </script>
</body>
</html>
